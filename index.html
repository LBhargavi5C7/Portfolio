  <style>
    /* Smooth scrolling for navigation links */
    html {
      scroll-behavior: smooth;
    }

    /* Fix for the Carousel Overlap */
    .carousel-item {
      height: 70vh; /* Takes up 70% of the screen height */
      min-height: 400px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)); /* Darkens the slide */
    }

    .carousel-content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }

    .content-box h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem); /* Responsive font size */
      font-weight: 800;
      letter-spacing: 2px;
    }

    .content-box p {
      font-size: 1.5rem;
      color: #0dcaf0;
    }

    /* Styling the Accordion to look cleaner */
    .accordion-button:not(.collapsed) {
      background-color: #2c3034;
      color: #0dcaf0;
      box-shadow: none;
    }

    .accordion-button:focus {
      box-shadow: none;
    }

    /* Skill bars transition */
    .progress {
      height: 10px;
      background-color: #343a40;
    }
  </style>
</head>
